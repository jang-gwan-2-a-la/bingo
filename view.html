<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상세보기</title>
    <style>
    body { 
        margin: 0; 
        background: #000; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        min-height: 100vh; 
        padding-top: 40px; 
    }
    .img-container { 
        width: 90%; 
        max-width: 800px; 
        position: relative;
        margin-bottom: 20px; 
        min-height: 300px; /* 로딩 중에도 영역 확보 */
        display: flex;
        justify-content: center;
        align-items: center;
    }
    img { 
        width: 100%; 
        height: auto; 
        display: none; /* 로딩 전에는 숨김 */
        border-radius: 12px; 
        box-shadow: 0 10px 30px rgba(255,255,255,0.1);
    }
    
    /* 로딩 스피너 UI */
    .loader {
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-left-color: #fff;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .back-btn { 
        padding: 12px 40px; 
        margin-bottom: 40px; 
        background: #fff; 
        border-radius: 30px; 
        text-decoration: none; 
        color: #000; 
        font-weight: bold; 
        transition: transform 0.2s;
    }
    .back-btn:active {
        transform: scale(0.95);
    }
    </style>
</head>
<body>
    <div class="img-container">
        <div id="loader" class="loader"></div>
        <img id="detail-img" src="" alt="공약 내용">
    </div>
    <a href="index.html" class="back-btn">뒤로 가기</a>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id') || '1';
        const imgElement = document.getElementById('detail-img');
        const loader = document.getElementById('loader');

        // 이미지 로드가 완료되면 실행
        imgElement.onload = function() {
            loader.style.display = 'none'; // 스피너 숨기기
            imgElement.style.display = 'block'; // 이미지 보이기
        };

        // 이미지 로드 시도
        imgElement.src = `images/${id}.jpg`;
    </script>
</body>
</html>
